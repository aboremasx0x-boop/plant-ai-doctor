<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Plant AI Doctor</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #edf7ed, #f8fbf8);
    margin: 0;
    padding: 0;
}

.container {
    max-width: 900px;
    margin: 30px auto;
    background: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.12);
}

h1 {
    text-align: center;
    color: #1b5e20;
}

.badge {
    display: inline-block;
    padding: 7px 16px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 13px;
}

.badge-ai {
    background: #2e7d32;
    color: white;
}

.badge-demo {
    background: #d84315;
    color: white;
}

.upload-box {
    margin-top: 20px;
    padding: 25px;
    text-align: center;
    border: 2px dashed #43a047;
    border-radius: 16px;
    background: #f7fff7;
}

button {
    background: #1b5e20;
    color: white;
    border: none;
    padding: 11px 28px;
    border-radius: 10px;
    margin-top: 14px;
    cursor: pointer;
}

.result {
    display: none;
    margin-top: 25px;
    background: #eef7ee;
    padding: 22px;
    border-radius: 16px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.card {
    background: white;
    padding: 14px;
    border-radius: 12px;
    border-right: 5px solid #2e7d32;
}

.label {
    font-weight: bold;
    color: #1b5e20;
}

.text-block {
    white-space: pre-line;
    line-height: 1.8;
}

.gauge-container {
    width: 160px;
    height: 160px;
    margin: 15px auto;
}

.gauge {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: conic-gradient(green 0%, #eee 0%);
    display: flex;
    align-items: center;
    justify-content: center;
}

.gauge-inner {
    width: 120px;
    height: 120px;
    background: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 20px;
}

.note {
    margin-top: 20px;
    padding: 14px;
    background: #fffde7;
    border-radius: 12px;
    color: #5d4037;
    line-height: 1.7;
}

@media (max-width: 700px) {
    .grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>Plant AI Doctor</h1>

    <div style="text-align:center;">
        <span class="badge badge-ai">AI-Powered Smart Decision System</span>
    </div>

    <div class="upload-box">
        <p>ارفع صورة النبات المصاب</p>
        <input type="file" id="imageInput" accept="image/*">
        <br>
        <button onclick="predictDisease()">تحليل الصورة</button>
    </div>

    <div class="result" id="resultBox">

        <h2>نتيجة التشخيص</h2>

        <div class="grid">

            <div class="card">
                <span class="label">وضع النظام:</span><br>
                <span id="modeBadge" class="badge"></span>
            </div>

            <div class="card">
                <span class="label">نسبة الثقة:</span><br>
                <span id="confidence"></span>%
            </div>

            <div class="card">
                <span class="label">شدة الإصابة:</span><br>
                <span id="severity"></span>
            </div>

            <div class="card">
                <span class="label">المحصول:</span><br>
                <span id="crop"></span>
            </div>

            <div class="card">
                <span class="label">المرض:</span><br>
                <span id="disease"></span>
            </div>

            <div class="card">
                <span class="label">المسبب:</span><br>
                <span id="pathogen"></span>
            </div>

            <div class="card">
                <span class="label">نوع المسبب:</span><br>
                <span id="ptype"></span>
            </div>

            <div class="card">
                <span class="label">المصدر:</span><br>
                <span id="source"></span>
            </div>

        </div>

        <div class="card" style="text-align:center; margin-top:12px;">
            <span class="label">مؤشر شدة الإصابة</span>

            <div class="gauge-container">
                <div class="gauge" id="gauge">
                    <div class="gauge-inner" id="gaugeValue">0%</div>
                </div>
            </div>
        </div>

        <div class="card" style="margin-top:12px;">
            <span class="label">الأعراض:</span>
            <p id="symptoms" class="text-block"></p>
        </div>

        <div class="card" style="margin-top:12px;">
            <span class="label">التوصية الذكية:</span>
            <p id="recommendation" class="text-block"></p>
        </div>

        <div class="note" id="note"></div>

    </div>

</div>

<script>
async function predictDisease() {

    const input = document.getElementById("imageInput");

    if (!input.files.length) {
        alert("اختر صورة أولاً");
        return;
    }

    const formData = new FormData();
    formData.append("file", input.files[0]);

    try {
        const response = await fetch("/predict", {
            method: "POST",
            body: formData
        });

        const data = await response.json();
        const d = data.diagnosis;
        const c = data.control_plan;

        const modeBadge = document.getElementById("modeBadge");

        if (data.mode === "real_ai_model") {
            modeBadge.innerText = "AI System";
            modeBadge.className = "badge badge-ai";
        } else {
            modeBadge.innerText = "AI Decision Engine";
            modeBadge.className = "badge badge-demo";
        }

        document.getElementById("confidence").innerText = data.confidence;

        const severityElement = document.getElementById("severity");
        const percent = data.severity.score;

        let severityColor = "green";

        if (percent < 50) {
            severityColor = "#4CAF50";
        } else if (percent < 75) {
            severityColor = "#FF9800";
        } else {
            severityColor = "#E53935";
        }

        severityElement.innerText =
            data.severity.level_ar + " - " +
            data.severity.level_en + " (" +
            percent + "%)";

        severityElement.style.color = severityColor;
        severityElement.style.fontWeight = "bold";
        severityElement.style.fontSize = "18px";

        const gauge = document.getElementById("gauge");
        const gaugeValue = document.getElementById("gaugeValue");

        gaugeValue.innerText = percent + "%";
        gaugeValue.style.color = severityColor;

        gauge.style.background = `conic-gradient(
            ${severityColor} ${percent}%,
            #e0e0e0 ${percent}%
        )`;

        document.getElementById("crop").innerText =
            d.crop_ar + " - " + d.crop_en;

        document.getElementById("disease").innerText =
            d.disease_ar + " - " + d.disease_en;

        document.getElementById("pathogen").innerText = d.pathogen;

        document.getElementById("ptype").innerText =
            d.pathogen_type_ar + " - " + d.pathogen_type_en;

        document.getElementById("source").innerText = d.source;

        document.getElementById("symptoms").innerText = d.symptoms;

        document.getElementById("recommendation").innerText =
            c.recommendation_text +
            "\n\nالعوامل الحيوية: " + c.bio_agents.join("، ") +
            "\n\nالمستخلصات النباتية: " + c.plant_extracts.join("، ") +
            "\n\nالإجراءات الحقلية: " + c.field_actions.join("، ");

        document.getElementById("note").innerText =
            "AI Decision Engine: النظام يحلل المرض، يقيم شدة الإصابة بصريًا، ويقترح مكافحة حيوية مناسبة لدعم القرار الزراعي.";

        document.getElementById("resultBox").style.display = "block";

    } catch (error) {
        alert("حدث خطأ. تأكد أن السيرفر يعمل أو أن التطبيق منشور بشكل صحيح.");
    }
}
</script>

</body>
</html>
